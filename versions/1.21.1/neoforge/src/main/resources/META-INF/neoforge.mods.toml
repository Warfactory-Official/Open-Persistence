modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${license}"

[[mods]]
modId = "openpersistence"
version = "${version}"
displayName = "${mod_name}"
description = "${description}"
authors = "${mod_author}"

[[dependencies.openpersistence]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.openpersistence]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,)"
ordering = "NONE"
side = "BOTH"

# Curios is a soft dependency: if present, load it before us so its slots are ready.
[[dependencies.openpersistence]]
modId = "curios"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

# Corpse / GraveStone are optional: if present, killed persistent bodies deposit into them.
[[dependencies.openpersistence]]
modId = "corpse"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

[[dependencies.openpersistence]]
modId = "gravestone"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"
